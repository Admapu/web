<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admapu Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="blog-page">
    <div class="scene" aria-hidden="true"></div>
    <canvas id="network" aria-hidden="true"></canvas>

    <main class="content blog-content">
      <section class="blog-shell">
        <header class="blog-header">
          <a href="/" class="back-link">← Volver</a>
          <h1>Blog</h1>
          <p class="subtitle">Notas técnicas y avances del proyecto Admapu.</p>
        </header>

        <article id="blog-post" class="blog-post" aria-live="polite"></article>
      </section>
    </main>

    <div class="vignette" aria-hidden="true"></div>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/blog.js"></script>
  </body>
</html>
